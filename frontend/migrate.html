<!DOCTYPE html>
<!-- This page was generated by AI but we carefully checked that everything works properly. It does:) -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVC Migration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: #111111;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 140, 0, 0.2);
            border: 1px solid #ff8c00;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff8c00, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .sub {
            color: #aaa;
            margin-bottom: 28px;
            border-left: 3px solid #ff8c00;
            padding-left: 12px;
        }

        .info-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 18px;
            margin: 20px 0;
            border: 1px solid #2a2a2a;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .label {
            color: #ff8c00;
            font-weight: 600;
        }

        .value {
            color: #e0e0e0;
            font-family: 'SF Mono', monospace;
            word-break: break-all;
            text-align: right;
        }

        /* Wallet selector */
        .wallet-selector {
            background: #0f0f0f;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #ff8c00;
        }

        .selector-label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: #ffb347;
        }

        select {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #ff8c00;
            border-radius: 48px;
            padding: 12px 18px;
            color: #fff;
            font-family: monospace;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
        }

        select:hover {
            background: #2a2a2a;
        }

        select:focus {
            border-color: #ffaa33;
            box-shadow: 0 0 6px rgba(255, 140, 0, 0.4);
        }

        .current-balance-hint {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #ffaa66;
            text-align: right;
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 24px 0;
        }

        .button {
            background: #1f1f1f;
            border: none;
            padding: 12px 24px;
            border-radius: 48px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
            flex: 1 0 auto;
            text-align: center;
            border: 1px solid #333;
        }

        .button-primary {
            background: #ff8c00;
            color: #111;
            border: none;
            box-shadow: 0 2px 8px rgba(255, 140, 0, 0.3);
        }

        .button-primary:hover:not(:disabled) {
            background: #ffa033;
            transform: translateY(-1px);
        }

        .button-secondary {
            border-color: #ff8c00;
            color: #ff8c00;
        }

        .button-secondary:hover:not(:disabled) {
            background: rgba(255, 140, 0, 0.1);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .balance-area {
            background: #0c0c0c;
            padding: 14px 18px;
            border-radius: 20px;
            margin: 16px 0;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-left: 4px solid #ff8c00;
        }

        .balance-number {
            font-family: monospace;
            font-weight: bold;
            color: #ffb347;
            font-size: 1.3rem;
        }

        .status {
            margin-top: 24px;
            padding: 14px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-word;
        }

        .success {
            background: #0f2c1a;
            border: 1px solid #2e7d32;
            color: #b9f6ca;
        }

        .error {
            background: #2c1010;
            border: 1px solid #d32f2f;
            color: #ffcdd2;
        }

        .loading {
            background: #1e2a1a;
            border: 1px solid #ff8c00;
            color: #ffe0b5;
        }

        hr {
            border-color: #2a2a2a;
            margin: 16px 0;
        }

        a {
            color: #ff8c00;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.7rem;
            color: #555;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>NVC Migration</h1>
    <div class="sub">BNB Smart Chain</div>

    <div class="info-card">
        <div class="info-row"><span class="label">Old Token (NVC)</span><span class="value">0xBF84720097de111A80f46f9D077643967042841A</span></div>
        <div class="info-row"><span class="label">New Token (wNVC)</span><span class="value">0x02C13f421ABCdD8A11faC1a4aE43c59d51FB9e19</span></div>
        <div class="info-row"><span class="label">Network</span><span class="value">BNB Smart Chain (Chain ID 56)</span></div>
    </div>

    <!-- WALLET SELECTOR DROPDOWN -->
    <div class="wallet-selector">
        <label class="selector-label">🔑 Select connected wallet</label>
        <select id="walletDropdown">
            <option value="">-- Connect wallet first --</option>
        </select>
        <div class="current-balance-hint" id="selectedHint"></div>
    </div>

    <div class="button-group">
        <button id="connectBtn" class="button button-primary">🌐 Connect & Switch to BSC</button>
        <button id="approveBtn" class="button button-secondary" disabled>✅ Approve Old Tokens</button>
        <button id="migrateBtn" class="button button-secondary" disabled>🚀 Migrate</button>
    </div>

    <div class="balance-area">
        <span>💼 Old NVC balance</span>
        <span id="oldBalance" class="balance-number">—</span>
    </div>

    <div id="status" class="status"></div>
    <footer>Select a wallet from the dropdown, then Approve → Migrate.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    // ---------- CONFIG ----------
    const OLD_TOKEN_ADDR = "0xBF84720097de111A80f46f9D077643967042841A";
    const NEW_TOKEN_ADDR = "0x02C13f421ABCdD8A11faC1a4aE43c59d51FB9e19";

    const ERC20_ABI = [
        "function balanceOf(address owner) view returns (uint256)",
        "function approve(address spender, uint256 amount) returns (bool)",
        "function allowance(address owner, address spender) view returns (uint256)",
        "function transferFrom(address from, address to, uint256 amount) returns (bool)"
    ];

    const NEW_ABI = [
        "function migrate() external",
        "function balanceOf(address owner) view returns (uint256)"
    ];

    const BSC_CHAIN_ID = "0x38";
    const BSC_NETWORK = {
        chainId: BSC_CHAIN_ID,
        chainName: "BNB Smart Chain",
        nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
        rpcUrls: ["https://bsc-dataseed.binance.org/"],
        blockExplorerUrls: ["https://bscscan.com/"]
    };

    let provider, signer;
    let currentAddress = null;
    let oldContract = null;
    let newContract = null;
    let allAccounts = [];

    // DOM elements
    const connectBtn = document.getElementById("connectBtn");
    const approveBtn = document.getElementById("approveBtn");
    const migrateBtn = document.getElementById("migrateBtn");
    const oldBalanceSpan = document.getElementById("oldBalance");
    const statusDiv = document.getElementById("status");
    const walletDropdown = document.getElementById("walletDropdown");
    const selectedHint = document.getElementById("selectedHint");

    function setStatus(message, type = "loading") {
        statusDiv.innerHTML = message;
        statusDiv.className = `status ${type}`;
    }

    // Populate dropdown with fetched accounts
    function populateDropdown(accounts) {
        walletDropdown.innerHTML = "";
        if (!accounts || accounts.length === 0) {
            const option = document.createElement("option");
            option.value = "";
            option.textContent = "-- No accounts found --";
            walletDropdown.appendChild(option);
            return;
        }
        for (const acc of accounts) {
            const option = document.createElement("option");
            option.value = acc;
            option.textContent = `${acc.slice(0,6)}...${acc.slice(-4)}`;
            walletDropdown.appendChild(option);
        }
        // If currentAddress is set, select it in dropdown
        if (currentAddress && accounts.includes(currentAddress)) {
            walletDropdown.value = currentAddress;
        } else if (accounts.length > 0) {
            walletDropdown.value = accounts[0];
            // trigger manual change to set currentAddress
            if (walletDropdown.value) switchToAccount(walletDropdown.value);
        }
    }

    // Switch internal signer/contracts to a new address
    async function switchToAccount(address) {
        if (!provider) {
            setStatus("Provider not ready. Click 'Connect' first.", "error");
            return false;
        }
        try {
            setStatus(`Switching to ${address.slice(0,6)}...${address.slice(-4)}...`, "loading");
            // Get a new signer for this specific address (MetaMask will sign for it if allowed)
            // Note: ethers signer is tied to the provider; we need to ensure the provider is still connected.
            // We'll just recreate signer from provider; the selected address must be one of the connected accounts.
            signer = provider.getSigner(address);
            // Verify that the signer can actually use this address (will work if MetaMask has it unlocked)
            const signerAddress = await signer.getAddress();
            if (signerAddress.toLowerCase() !== address.toLowerCase()) {
                throw new Error("Signer address mismatch");
            }
            currentAddress = signerAddress;
            oldContract = new ethers.Contract(OLD_TOKEN_ADDR, ERC20_ABI, signer);
            newContract = new ethers.Contract(NEW_TOKEN_ADDR, NEW_ABI, signer);
            
            // Update UI
            selectedHint.innerText = `Active: ${currentAddress.slice(0,8)}...${currentAddress.slice(-6)}`;
            await loadOldBalance();
            setStatus(`Ready with wallet ${currentAddress.slice(0,6)}...${currentAddress.slice(-4)}`, "success");
            return true;
        } catch (err) {
            console.error(err);
            setStatus(`Failed to switch to selected account: ${err.message}`, "error");
            return false;
        }
    }

    // Load old token balance and enable/disable approve button
    async function loadOldBalance() {
        if (!oldContract || !currentAddress) {
            oldBalanceSpan.innerText = "—";
            approveBtn.disabled = true;
            migrateBtn.disabled = true;
            return ethers.BigNumber.from(0);
        }
        try {
            const balance = await oldContract.balanceOf(currentAddress);
            const formatted = ethers.utils.formatEther(balance);
            oldBalanceSpan.innerText = `${formatted} NVC`;
            if (balance.gt(0)) {
                approveBtn.disabled = false;
                setStatus(`Ready to approve ${formatted} NVC for migration.`, "success");
            } else {
                approveBtn.disabled = true;
                migrateBtn.disabled = true;
                setStatus("⚠️ No old NVC tokens found in this wallet.", "loading");
            }
            return balance;
        } catch (err) {
            console.error(err);
            oldBalanceSpan.innerText = "Error";
            setStatus("Failed to load old token balance. Check contract & network.", "error");
            return ethers.BigNumber.from(0);
        }
    }

    // Connect to MetaMask, switch to BSC, fetch all accounts
    async function connectAndSwitch() {
        if (!window.ethereum) {
            setStatus("❌ MetaMask not installed.", "error");
            return false;
        }
        try {
            setStatus("🔄 Connecting & switching to BSC...", "loading");
            // Request accounts to get permission
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            await switchToBSC();
            
            // Initialize provider
            provider = new ethers.providers.Web3Provider(window.ethereum);
            // Get all accounts (connected)
            allAccounts = await provider.listAccounts();
            if (allAccounts.length === 0) {
                throw new Error("No accounts found");
            }
            populateDropdown(allAccounts);
            // Set first account as current
            currentAddress = allAccounts[0];
            signer = provider.getSigner(currentAddress);
            oldContract = new ethers.Contract(OLD_TOKEN_ADDR, ERC20_ABI, signer);
            newContract = new ethers.Contract(NEW_TOKEN_ADDR, NEW_ABI, signer);
            selectedHint.innerText = `Active: ${currentAddress.slice(0,8)}...${currentAddress.slice(-6)}`;
            await loadOldBalance();
            setStatus(`✅ Connected as ${currentAddress.slice(0,6)}...${currentAddress.slice(-4)} on BSC`, "success");
            connectBtn.disabled = true;
            connectBtn.innerText = "✅ Connected";
            return true;
        } catch (err) {
            setStatus(`❌ Connection failed: ${err.message}`, "error");
            console.error(err);
            return false;
        }
    }

    async function switchToBSC() {
        try {
            await window.ethereum.request({
                method: "wallet_switchEthereumChain",
                params: [{ chainId: BSC_CHAIN_ID }]
            });
            return true;
        } catch (switchError) {
            if (switchError.code === 4902) {
                try {
                    await window.ethereum.request({
                        method: "wallet_addEthereumChain",
                        params: [BSC_NETWORK]
                    });
                    return true;
                } catch (addError) {
                    throw new Error("Could not add BSC: " + addError.message);
                }
            }
            throw switchError;
        }
    }

    // Approve old tokens for the new contract
    async function approveOldTokens() {
        if (!oldContract || !newContract || !currentAddress) {
            setStatus("Please connect wallet first.", "error");
            return;
        }
        try {
            const balance = await oldContract.balanceOf(currentAddress);
            if (balance.isZero()) {
                setStatus("No tokens to approve.", "error");
                return;
            }
            setStatus("🔄 Approving old tokens (this requires one transaction)...", "loading");
            approveBtn.disabled = true;
            migrateBtn.disabled = true;

            const tx = await oldContract.approve(NEW_TOKEN_ADDR, balance);
            setStatus(`⏳ Approval tx: ${tx.hash}. Waiting confirmation...`, "loading");
            await tx.wait(1);
            setStatus("✅ Approval successful! You can now migrate.", "success");
            migrateBtn.disabled = false;
        } catch (err) {
            setStatus(`❌ Approval failed: ${err.message}`, "error");
            approveBtn.disabled = false;
        }
    }

    // Migration: call migrate() on new contract
    async function migrate() {
        if (!newContract || !currentAddress) {
            setStatus("Please connect wallet first.", "error");
            return;
        }
        try {
            setStatus("🔄 Migrating... burning old NVC, minting wNVC.", "loading");
            migrateBtn.disabled = true;
            approveBtn.disabled = true;

            const tx = await newContract.migrate();
            setStatus(`⏳ Migration tx: ${tx.hash}. Waiting...`, "loading");
            const receipt = await tx.wait(1);
            if (receipt.status === 1) {
                let newBalance = "?";
                try {
                    const bal = await newContract.balanceOf(currentAddress);
                    newBalance = ethers.utils.formatEther(bal);
                } catch(e) {}
                setStatus(`🎉 Migration successful! Received ${newBalance} wNVC. <a href="https://bscscan.com/tx/${tx.hash}" target="_blank">View on BscScan</a>`, "success");
                await loadOldBalance();  // old balance should become zero
                migrateBtn.disabled = true;
            } else {
                setStatus("❌ Migration transaction failed on-chain.", "error");
                migrateBtn.disabled = false;
            }
        } catch (err) {
            setStatus(`❌ Migration error: ${err.message}`, "error");
            migrateBtn.disabled = false;
            approveBtn.disabled = false;
        }
    }

    // Dropdown change handler
    async function onWalletChange() {
        const selected = walletDropdown.value;
        if (!selected) return;
        if (!provider) {
            setStatus("Provider not initialized. Please click 'Connect' first.", "error");
            return;
        }
        await switchToAccount(selected);
    }

    // Listen to MetaMask account changes (to refresh dropdown)
    if (window.ethereum) {
        window.ethereum.on("accountsChanged", async (accounts) => {
            if (accounts.length === 0) {
                window.location.reload();
            } else {
                // Refresh dropdown list and reselect current if present
                if (provider) {
                    const newList = await provider.listAccounts();
                    allAccounts = newList;
                    populateDropdown(allAccounts);
                    if (currentAddress && newList.includes(currentAddress)) {
                        walletDropdown.value = currentAddress;
                    } else if (newList.length > 0) {
                        await switchToAccount(newList[0]);
                    }
                } else {
                    window.location.reload();
                }
            }
        });
        window.ethereum.on("chainChanged", () => {
            window.location.reload();
        });
    }

    // Event listeners
    connectBtn.addEventListener("click", connectAndSwitch);
    approveBtn.addEventListener("click", approveOldTokens);
    migrateBtn.addEventListener("click", migrate);
    walletDropdown.addEventListener("change", onWalletChange);
</script>
</body>
</html>
